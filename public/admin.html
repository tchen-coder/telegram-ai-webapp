<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秘语陪聊管理后台</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/config.js"></script>
  </head>
  <body>
    <div class="admin-shell">
      <header class="admin-header">
        <div>
          <p class="admin-eyebrow">Admin Console</p>
          <h1>秘语陪聊后台</h1>
        </div>
        <div class="admin-token-box">
          <input id="adminTokenInput" type="password" placeholder="后台 Token，可留空" />
          <button id="saveTokenButton" type="button">保存 Token</button>
        </div>
      </header>

      <section class="admin-status hidden" id="adminStatus"></section>

      <main class="admin-grid">
        <section class="admin-panel">
          <div class="admin-panel-head">
            <h2>角色管理</h2>
            <button id="newRoleButton" type="button">新建角色</button>
          </div>
          <div class="admin-role-layout">
            <aside class="admin-role-list" id="roleList"></aside>
            <div class="admin-form-stack">
              <form class="admin-form" id="roleForm">
                <input id="roleIdInput" type="hidden" />
                <label>
                  <span>角色名称</span>
                  <input id="roleNameInput" type="text" required />
                </label>
                <label>
                  <span>头像地址</span>
                  <input id="roleAvatarInput" type="text" />
                </label>
                <label>
                  <span>标签</span>
                  <div class="admin-tag-picker" id="roleTagPicker"></div>
                  <input id="roleTagCustomInput" type="text" placeholder="补充自定义标签，多个用逗号分隔" />
                  <small class="admin-help">预设标签可多选，也可以补充自定义标签。</small>
                </label>
                <label>
                  <span>角色简介 / 场景</span>
                  <textarea id="roleScenarioInput" rows="4"></textarea>
                </label>
                <label>
                  <span>开场白</span>
                  <textarea id="roleGreetingInput" rows="4"></textarea>
                </label>
                <section class="admin-subpanel admin-prompt-section">
                  <div class="admin-panel-head compact admin-panel-head-text">
                    <div>
                      <h3>关系提示词</h3>
                      <p class="admin-help admin-help-inline">
                        `relationship=1/2/3` 分别对应朋友、恋人、灵魂伴侣。默认按朋友关系生效；后两档留空时会回退到朋友提示词。
                      </p>
                    </div>
                  </div>
                  <div class="admin-prompt-grid">
                    <label class="admin-prompt-card">
                      <span>朋友 · relationship=1</span>
                      <small>默认提示词，必填</small>
                      <textarea id="rolePromptFriendInput" rows="9" required></textarea>
                    </label>
                    <label class="admin-prompt-card">
                      <span>恋人 · relationship=2</span>
                      <small>关系升级后生效</small>
                      <textarea id="rolePromptPartnerInput" rows="9"></textarea>
                    </label>
                    <label class="admin-prompt-card">
                      <span>灵魂伴侣 · relationship=3</span>
                      <small>最高亲密关系提示词</small>
                      <textarea id="rolePromptLoverInput" rows="9"></textarea>
                    </label>
                  </div>
                </section>
                <label class="admin-checkbox">
                  <input id="roleActiveInput" type="checkbox" checked />
                  <span>角色启用</span>
                </label>
                <div class="admin-actions">
                  <button id="saveRoleButton" type="submit">保存角色</button>
                </div>
              </form>

              <section class="admin-subpanel">
                <div class="admin-panel-head">
                  <h3>角色图片资源</h3>
                  <button id="newImageButton" type="button">新增图片</button>
                </div>
                <div class="admin-image-layout">
                  <aside class="admin-image-list" id="roleImageList"></aside>
                  <form class="admin-form" id="roleImageForm">
                    <input id="roleImageIdInput" type="hidden" />
                    <label>
                      <span>图片地址</span>
                      <input id="roleImageUrlInput" type="text" placeholder="https://..." />
                    </label>
                    <label>
                      <span>图片类型</span>
                      <select id="roleImageTypeInput">
                        <option value="opening">opening</option>
                        <option value="warm">warm</option>
                        <option value="flirt">flirt</option>
                        <option value="avatar">avatar</option>
                        <option value="stage">stage</option>
                      </select>
                    </label>
                    <label>
                      <span>阶段标识</span>
                      <input id="roleImageStageInput" type="text" placeholder="intro / warm / flirt" />
                    </label>
                    <label>
                      <span>触发方式</span>
                      <select id="roleImageTriggerInput">
                        <option value="manual">manual</option>
                        <option value="auto_by_turn">auto_by_turn</option>
                        <option value="auto_by_mood">auto_by_mood</option>
                        <option value="auto_by_keyword">auto_by_keyword</option>
                      </select>
                    </label>
                    <label>
                      <span>排序</span>
                      <input id="roleImageSortInput" type="number" min="0" step="1" value="0" />
                    </label>
                    <label class="admin-checkbox">
                      <input id="roleImageActiveInput" type="checkbox" checked />
                      <span>图片启用</span>
                    </label>
                    <div class="admin-actions">
                      <button id="saveRoleImageButton" type="submit">保存图片</button>
                    </div>
                  </form>
                </div>
              </section>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/js/admin.js"></script>
  </body>
</html>
